<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:40px;
    font-size:40px;
    text-shadow:2px 2px 5px rgba(0,0,0,.3);
}

.card-container{
    display:flex;
    gap:40px;
}

.card{
    width:250px;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.icon{
    font-size:70px;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:20px;
    color:#333;
}

.btn{
    display:inline-block;
    padding:12px 30px;
    text-decoration:none;
    color:white;
    background:#007bff;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#0056b3;
}

.admin{
    background:#28a745;
}

.admin:hover{
    background:#1e7e34;
}

</style>

</head>
<body>

<div class="container">

    <h1>📚 Library Management System</h1>

    <div class="card-container">

        <!-- User Login -->
        <div class="card">
            <div class="icon">👤</div>
            <h2>User Login</h2>
            <a th:href="@{/user/login}" class="btn">Login</a>
        </div>

        <!-- Admin Login -->
        <div class="card">
            <div class="icon">🛡️</div>
            <h2>Admin Login</h2>
            <a th:href="@{/admin/login}" class="btn admin">Login</a>
        </div>

    </div>

</div>

</body>
</html>
