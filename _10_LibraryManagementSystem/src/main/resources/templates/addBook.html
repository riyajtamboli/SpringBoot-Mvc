<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Book</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#74ebd5,#9face6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:420px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
    color:#444;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#4CAF50;
    box-shadow:0 0 5px rgba(76,175,80,.4);
}

button{
    width:100%;
    margin-top:25px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#2E7D32;
}
</style>

</head>

<body>

<div class="container">

    <h1>📚 Store Book in Library</h1>

    <form th:action="@{/save}" method="post" th:object="${book}">

        <label>Name</label>
        <input type="text" th:field="*{name}" placeholder="Enter Book Name">

        <label>Author</label>
        <input type="text" th:field="*{author}" placeholder="Enter Author Name">

        <button type="submit">Save Book</button>

    </form>

</div>

</body>
</html>
