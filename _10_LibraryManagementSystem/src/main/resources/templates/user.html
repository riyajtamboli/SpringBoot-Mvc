<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.container{
    text-align:center;
}

h1{
    color:white;
    font-size:40px;
    margin-bottom:40px;
}

.card{
    width:300px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

.card h2{
    color:#333;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:12px 30px;
    text-decoration:none;
    color:white;
    background:#007bff;
    border-radius:8px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#0056b3;
}

</style>

</head>
<body>

<div class="container">

    <h1>📚 User Dashboard</h1>

    <div class="card">

        <div class="icon">📋</div>

        <h2>Book Report</h2>

        <a th:href="@{/report}" class="btn">
            View Report
        </a>

    </div>

</div>

</body>
</html>
